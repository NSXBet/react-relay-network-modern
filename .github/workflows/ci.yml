name: CI

on:
  push:
    branches: [main, alpha, beta]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime (node + bun via mise)
        uses: jdx/mise-action@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (oxlint)
        run: bun run lint
      - name: Typecheck (tsc)
        run: bun run typecheck
      - name: Test (vitest + coverage)
        run: bun run coverage
      - name: Build (tsdown)
        run: bun run build

  publish:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/beta'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime (node + bun via mise)
        uses: jdx/mise-action@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build (tsdown)
        run: bun run build
      - name: Semantic Release (publish to npm)
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
